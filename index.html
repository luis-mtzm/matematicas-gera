<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matemáticas Gera 🚀</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a5e 50%, #0d3b6e 100%);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }
    .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    .star { position:absolute; background:white; border-radius:50%; animation: twinkle 2s infinite alternate; }
    @keyframes twinkle { from{opacity:0.3} to{opacity:1} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .container { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:20px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #welcome-screen { text-align:center; }
    .title { font-size:2.5rem; font-weight:700; margin-bottom:10px; }
    .subtitle { font-size:1.1rem; opacity:0.8; margin-bottom:30px; }
    .characters { display:flex; justify-content:center; align-items:flex-end; gap:30px; margin:30px 0; flex-wrap:wrap; }
    .character-card { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .character-img { width:130px; height:130px; object-fit:contain; animation:float 3s ease-in-out infinite; }
    .character-name { font-size:1.2rem; font-weight:600; color:#ffeb3b; }
    .character-role { font-size:0.85rem; opacity:0.7; }
    .villain-name { color:#ce93d8; }
    .btn-start { background:linear-gradient(135deg,#ff6b35,#f7c59f); border:none; color:#1a0a00; font-size:1.4rem; font-weight:700; padding:18px 50px; border-radius:50px; cursor:pointer; margin-top:20px; transition:transform 0.2s; box-shadow:0 6px 20px rgba(255,107,53,0.4); }
    .btn-start:hover { transform:scale(1.05); }
    #question-screen { width:100%; display:none; }
    .progress-bar-container { width:100%; height:12px; background:rgba(255,255,255,0.2); border-radius:6px; margin-bottom:20px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,#4caf50,#8bc34a); border-radius:6px; transition:width 0.5s ease; }
    .question-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; font-size:0.9rem; opacity:0.7; }
